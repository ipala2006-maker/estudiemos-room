name: Codex Apply Screen Remote Control

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download payload
        run: |
          curl -L "https://files.catbox.moe/a9tys3.zip" -o codex-payload.zip
          echo "923282c9eb8d5f871fe3259e388359da25eed4c675b0756855a55336960565f5  codex-payload.zip" | sha256sum -c -

      - name: Apply payload
        run: |
          unzip -o codex-payload.zip -d codex-payload
          cp -R codex-payload/. ./
          rm -rf codex-payload codex-payload.zip
          rm -f .github/workflows/codex-apply-screen-remote-control.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/FirstPersonWorld.jsx src/components/ScreenRemoteControl.jsx src/main.jsx src/styles/app.css .github/workflows/codex-apply-screen-remote-control.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add screen remote control"
          git push
