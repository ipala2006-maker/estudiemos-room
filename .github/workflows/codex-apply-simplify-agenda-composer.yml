name: Apply agenda composer simplification

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-apply-simplify-agenda-composer.yml
      - codex-simplify-agenda-composer-20260719.patch

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply patch
        run: |
          set -euo pipefail
          PATCH_FILE="codex-simplify-agenda-composer-20260719.patch"
          WORKFLOW_FILE=".github/workflows/codex-apply-simplify-agenda-composer.yml"

          if [ ! -f "$PATCH_FILE" ]; then
            echo "Patch already removed."
            exit 0
          fi

          git apply --whitespace=nowarn "$PATCH_FILE"
          rm -f "$PATCH_FILE" "$WORKFLOW_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/AgendaCalendarPlanner.jsx "$PATCH_FILE" "$WORKFLOW_FILE"
          git commit -m "Simplify agenda task composer"
          git push
