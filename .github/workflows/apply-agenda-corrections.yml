name: Apply Agenda Corrections

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-agenda-corrections.yml"
      - ".codex/agenda-fix.part*.b64"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply agenda corrections
        run: |
          set -euo pipefail
          cat .codex/agenda-fix.part*.b64 > .codex/agenda-fix.b64
          base64 -d .codex/agenda-fix.b64 > .codex/agenda-fix.patch
          git apply --ignore-whitespace --whitespace=nowarn .codex/agenda-fix.patch
          rm -f .codex/agenda-fix.part*.b64 .codex/agenda-fix.b64 .codex/agenda-fix.patch
          rm -f .github/workflows/apply-agenda-corrections.yml
          rmdir .codex 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Simplify agenda tasks and subject editing"
          git push
