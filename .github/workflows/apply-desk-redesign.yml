name: Apply Estudiemos Room desk redesign payload

on:
  push:
    branches:
      - main
    paths:
      - '.codex-desk-payload/**'
      - '.github/workflows/apply-desk-redesign.yml'

permissions:
  contents: write

jobs:
  apply-desk-redesign:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply verified desk redesign patch
        run: node .codex-desk-payload/apply-desk-redesign.mjs

      - name: Commit applied source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit"
            exit 0
          fi
          git commit -m "Rebuild Casa 1 desk and synced agenda"
          git push
