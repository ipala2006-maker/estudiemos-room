name: Apply agenda task detail patch

on:
  push:
    branches:
      - main
    paths:
      - codex-agenda-detail.patch
      - .github/workflows/apply-agenda-detail.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply patch and clean temporary files
        shell: bash
        run: |
          set -euo pipefail
          git apply --check --ignore-space-change --ignore-whitespace codex-agenda-detail.patch
          git apply --ignore-space-change --ignore-whitespace codex-agenda-detail.patch
          rm codex-agenda-detail.patch .github/workflows/apply-agenda-detail.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/AgendaCalendarPlanner.jsx src/styles/agenda-calendar-planner.css codex-agenda-detail.patch .github/workflows/apply-agenda-detail.yml
          git commit -m "Simplify agenda task detail actions"
          git push origin HEAD:main
