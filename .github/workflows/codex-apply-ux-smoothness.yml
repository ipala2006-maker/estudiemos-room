name: Codex Apply UX Smoothness

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Codex payload
        run: |
          curl -L --fail --retry 3 --retry-delay 2 "https://files.catbox.moe/e46i5v.zip" -o codex-payload.zip
          echo "7db360a82dbc61ec802fa1fd59b905992657388c02a89bacee8dab97584d49ff  codex-payload.zip" | sha256sum -c -

      - name: Apply files
        run: |
          set +e
          unzip -o codex-payload.zip -d codex-payload
          unzip_status=$?
          set -e
          if [ "$unzip_status" -gt 1 ]; then
            exit "$unzip_status"
          fi
          test -f codex-payload/src/main.jsx
          test -f codex-payload/src/components/FirstPersonWorld.jsx
          cp -R codex-payload/. ./
          rm -rf codex-payload codex-payload.zip
          rm -f .github/workflows/codex-apply-ux-smoothness.yml

      - name: Commit to main
        run: |
          git config user.name "codex-apply-bot"
          git config user.email "codex-apply-bot@users.noreply.github.com"
          git add src/components/FirstPersonWorld.jsx src/components/ComputerUI.jsx src/components/ScreenRemoteControl.jsx src/main.jsx src/styles/app.css src/styles/computer-os-corrections.css .github/workflows/codex-apply-ux-smoothness.yml
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Polish interaction smoothness"
            git push origin HEAD:main
          fi
