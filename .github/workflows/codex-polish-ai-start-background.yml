name: Polish AI start background

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-polish-ai-start-background.yml

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Polish generated start screen
        run: |
          set -euo pipefail

          WORKFLOW_FILE=".github/workflows/codex-polish-ai-start-background.yml"

          python3 <<'PY'
          from pathlib import Path
          import re

          app = Path('src/styles/app.css')
          text = app.read_text()

          text, count_main = re.subn(
              r'\n\.start-room-visual \{.*?\n\.start-content\.start-content-immersive \{',
              '\n.start-content.start-content-immersive {',
              text,
              count=1,
              flags=re.S,
          )
          text, count_mobile = re.subn(
              r'\n  \.start-room-window \{.*?\n  \.start-content\.start-content-immersive h1 \{',
              '\n  .start-content.start-content-immersive h1 {',
              text,
              count=1,
              flags=re.S,
          )
          if count_main != 1 or count_mobile != 1:
              raise SystemExit(f'Could not remove legacy start-room geometry styles: {count_main=} {count_mobile=}')
          app.write_text(text)

          Path('src/styles/start-screen-ai.css').write_text('''/* AI-generated background pass for the immersive entry screen. */
          .start-screen.start-screen-immersive {
            background:
              radial-gradient(ellipse at 50% 48%, rgba(3, 8, 8, 0.54) 0 30%, rgba(3, 8, 8, 0.24) 56%, rgba(3, 8, 8, 0.08) 100%),
              linear-gradient(180deg, rgba(5, 8, 8, 0.02), rgba(5, 8, 8, 0.1) 58%, rgba(5, 8, 8, 0.36)),
              linear-gradient(90deg, rgba(4, 7, 8, 0.08), rgba(4, 7, 8, 0) 48%, rgba(4, 7, 8, 0.08)),
              url("../assets/start-room-ai-background.webp") center / cover no-repeat,
              #101817 !important;
          }

          .start-screen.start-screen-immersive::before {
            height: 100% !important;
            background:
              radial-gradient(circle at 56% 33%, rgba(255, 248, 218, 0.14), transparent 42%),
              linear-gradient(180deg, rgba(255, 248, 231, 0.04), transparent 38%, rgba(0, 0, 0, 0.08)) !important;
            opacity: 0.76 !important;
          }

          .start-screen.start-screen-immersive::after {
            background:
              radial-gradient(ellipse at 50% 47%, rgba(0, 0, 0, 0.32) 0 36%, transparent 68%),
              linear-gradient(90deg, rgba(0, 0, 0, 0.1), transparent 34%, rgba(0, 0, 0, 0.06)) !important;
            transform: none !important;
            transform-origin: center !important;
          }

          @media (max-width: 760px) {
            .start-screen.start-screen-immersive {
              background-position: 58% center !important;
            }
          }
          '''.replace('\n          ', '\n').lstrip())
          PY

          rm -f "$WORKFLOW_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/styles/app.css src/styles/start-screen-ai.css
          git add -u "$WORKFLOW_FILE" || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Polish AI start screen background"
          git push
