name: Apply agenda interaction polish

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-apply-agenda-interactions.yml
      - codex-agenda-interactions-20260719.patch.gz.b64

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply patch
        run: |
          set -euo pipefail
          PATCH_PAYLOAD="codex-agenda-interactions-20260719.patch.gz.b64"
          PATCH_FILE="codex-agenda-interactions-20260719.patch"
          WORKFLOW_FILE=".github/workflows/codex-apply-agenda-interactions.yml"

          if [ ! -f "$PATCH_PAYLOAD" ]; then
            echo "Patch payload already removed."
            exit 0
          fi

          base64 -d "$PATCH_PAYLOAD" | gzip -d > "$PATCH_FILE"
          git apply --whitespace=nowarn "$PATCH_FILE"
          rm -f "$PATCH_FILE" "$PATCH_PAYLOAD" "$WORKFLOW_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/AgendaCalendarPlanner.jsx src/components/ComputerUI.jsx src/styles/agenda-calendar-planner.css src/utils/agendaSync.js "$PATCH_PAYLOAD" "$WORKFLOW_FILE"
          git commit -m "Polish agenda interactions and contextual panel"
          git push
