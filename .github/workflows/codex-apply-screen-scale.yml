name: Codex Apply Screen Scale

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download payload
        run: |
          curl -L "https://files.catbox.moe/iraxnq.zip" -o codex-payload.zip
          echo "c520cae663589b650cee9c773c1cad75d8f73d49f97ce105101ae37fdfe08508  codex-payload.zip" | sha256sum -c -

      - name: Apply payload
        run: |
          unzip -o codex-payload.zip -d codex-payload
          cp -R codex-payload/. ./
          rm -rf codex-payload codex-payload.zip
          rm -f .github/workflows/codex-apply-screen-scale.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/FirstPersonWorld.jsx src/components/ComputerUI.jsx src/components/VirtualComputerShell.jsx src/main.jsx src/styles/app.css src/styles/computer-os-corrections.css .github/workflows/codex-apply-screen-scale.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add screen size controls and room corrections"
          git push
