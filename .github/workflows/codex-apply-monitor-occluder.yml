name: Codex Apply Monitor Occluder

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Codex payload
        run: |
          curl -L --fail --retry 3 --retry-delay 2 "https://files.catbox.moe/9gp8pw.zip" -o codex-payload.zip
          echo "5c7482e3e000d9c535a9a4545a86d95586ce71c47345446952c180a67cbf8e55  codex-payload.zip" | sha256sum -c -

      - name: Apply files
        run: |
          set +e
          unzip -o codex-payload.zip -d codex-payload
          unzip_status=$?
          set -e
          if [ "$unzip_status" -gt 1 ]; then
            exit "$unzip_status"
          fi
          test -f codex-payload/src/components/FirstPersonWorld.jsx
          test -f codex-payload/src/styles/app.css
          cp -R codex-payload/. ./
          rm -rf codex-payload codex-payload.zip
          rm -f .github/workflows/codex-apply-monitor-occluder.yml

      - name: Commit to main
        run: |
          git config user.name "codex-apply-bot"
          git config user.email "codex-apply-bot@users.noreply.github.com"
          git add src/components/FirstPersonWorld.jsx src/styles/app.css .github/workflows/codex-apply-monitor-occluder.yml
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix monitor visibility over room screen"
            git push origin HEAD:main
          fi
