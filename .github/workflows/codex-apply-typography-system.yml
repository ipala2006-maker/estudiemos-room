name: Apply typography system

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-apply-typography-system.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply typography system
        run: |
          set -euo pipefail

          WORKFLOW_FILE=".github/workflows/codex-apply-typography-system.yml"

          python3 <<'PY'
          from pathlib import Path

          def ensure_replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'Missing expected text in {path}: {old[:80]!r}')
              file.write_text(text.replace(old, new, 1))

          def ensure_insert_after(path, marker, insertion, guard):
              file = Path(path)
              text = file.read_text()
              if guard in text:
                  return
              if marker not in text:
                  raise SystemExit(f'Missing marker in {path}: {marker[:80]!r}')
              file.write_text(text.replace(marker, marker + insertion, 1))

          Path('src/styles/typography-system.css').write_text('''@import url("https://fonts.googleapis.com/css2?family=Archivo+Black&family=Plus+Jakarta+Sans:wght@500;600;700;800;900&display=swap");

          :root {
            --font-room-ui: "Plus Jakarta Sans", Inter, "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            --font-room-display: "Archivo Black", "Plus Jakarta Sans", Impact, "Arial Black", system-ui, sans-serif;
            --font-room-code: "Plus Jakarta Sans", ui-monospace, "SFMono-Regular", Consolas, monospace;
            font-family: var(--font-room-ui);
            font-synthesis-weight: none;
          }

          html,
          body,
          #root,
          button,
          input,
          select,
          textarea,
          option,
          optgroup {
            font-family: var(--font-room-ui);
          }

          body {
            font-feature-settings: "kern" 1, "liga" 1, "calt" 1;
            font-kerning: normal;
          }

          .start-screen,
          .hud,
          .room-overlay,
          .interaction-prompt-stack,
          .computer-overlay,
          .computer-shell,
          .computer-window,
          .computer-desktop,
          .computer-app,
          .computer-taskbar,
          .screen-remote,
          .speaker-remote,
          .wall-agenda-modal,
          .agenda-planner,
          .agenda-calendar-planner,
          .planner-shell,
          .spotify-app,
          .settings-app,
          .profile-app,
          .links-app,
          .study-app {
            font-family: var(--font-room-ui);
          }

          .start-screen *,
          .hud *,
          .room-overlay *,
          .interaction-prompt-stack *,
          .computer-overlay *,
          .computer-shell *,
          .computer-window *,
          .computer-desktop *,
          .computer-app *,
          .computer-taskbar *,
          .screen-remote *,
          .speaker-remote *,
          .wall-agenda-modal *,
          .agenda-planner *,
          .agenda-calendar-planner *,
          .planner-shell *,
          .spotify-app *,
          .settings-app *,
          .profile-app *,
          .links-app *,
          .study-app * {
            font-family: inherit;
          }

          .start-content.start-content-immersive h1 {
            font-family: var(--font-room-display) !important;
            font-size: clamp(3.8rem, 10vw, 8.6rem) !important;
            font-weight: 900;
            line-height: 0.9;
          }

          .start-content.start-content-immersive h1 span {
            display: block;
            font-family: inherit;
          }

          .start-content h1,
          .computer-window-title,
          .computer-app-title,
          .agenda-planner-title,
          .planner-month-title,
          .wall-agenda-modal h1,
          .wall-agenda-modal h2,
          .hud-rank-title,
          .hud-location,
          .screen-remote-title,
          .speaker-remote-title {
            font-family: var(--font-room-ui);
            font-weight: 900;
          }

          .build-version-pill,
          .hud-build-version,
          .interaction-key,
          .key-hint,
          .shortcut-key,
          .keyboard-key,
          .remote-key,
          .computer-address,
          .computer-status,
          .agenda-chip,
          .planner-chip,
          .task-status,
          .badge,
          .pill,
          .dog-tag-letter {
            font-family: var(--font-room-ui) !important;
            font-weight: 800;
          }

          code,
          kbd,
          samp,
          pre {
            font-family: var(--font-room-code);
          }

          @media (max-width: 760px) {
            .start-content.start-content-immersive {
              width: min(100%, calc(100vw - 28px)) !important;
            }

            .start-content.start-content-immersive h1 {
              max-width: 100% !important;
              font-size: clamp(2rem, 8vw, 3.1rem) !important;
            }

            .start-content.start-content-immersive .start-lead {
              max-width: min(100%, 25ch);
              font-size: clamp(0.86rem, 3.7vw, 1rem);
              line-height: 1.35;
            }

            .start-enter-button {
              width: min(300px, calc(100vw - 56px)) !important;
              min-width: 0 !important;
              padding-inline: 16px !important;
              font-size: clamp(0.88rem, 3.8vw, 1rem) !important;
            }
          }
          '''.replace('\n          ', '\n').lstrip())

          ensure_replace(
              'src/main.jsx',
              "import './styles/hud-xp-bar.css';\nimport './utils/installComputerKeyboardController.js';",
              "import './styles/hud-xp-bar.css';\nimport './styles/typography-system.css';\nimport './utils/installComputerKeyboardController.js';",
          )

          ensure_replace(
              'src/components/StartScreen.jsx',
              '<h1 id="start-title">ESTUDIEMOS ROOM</h1>',
              '<h1 id="start-title" aria-label="ESTUDIEMOS ROOM">\n          <span>ESTUDIEMOS</span>\n          <span>ROOM</span>\n        </h1>',
          )

          ensure_insert_after(
              'src/components/FirstPersonWorld.jsx',
              "import playerVehicleSideUrl from '../assets/player-vehicle-side.png';\n\n",
              "const CANVAS_FONT_STACK = '\"Plus Jakarta Sans\", \"Segoe UI\", system-ui, sans-serif';\n\nfunction canvasFont(weight, size) {\n  return `${weight} ${size}px ${CANVAS_FONT_STACK}`;\n}\n\n",
              'const CANVAS_FONT_STACK =',
          )

          replacements = [
              ("ctx.font = '900 42px system-ui, sans-serif';", "ctx.font = canvasFont(900, 42);"),
              ("ctx.font = '700 22px system-ui, sans-serif';", "ctx.font = canvasFont(700, 22);"),
              ("ctx.font = '900 28px system-ui, sans-serif';", "ctx.font = canvasFont(900, 28);"),
              ("ctx.font = '700 18px system-ui, sans-serif';", "ctx.font = canvasFont(700, 18);"),
              ("ctx.font = '900 24px system-ui, sans-serif';", "ctx.font = canvasFont(900, 24);"),
              ("ctx.font = '900 25px system-ui, sans-serif';", "ctx.font = canvasFont(900, 25);"),
              ("ctx.font = '700 17px system-ui, sans-serif';", "ctx.font = canvasFont(700, 17);"),
              ("ctx.font = `900 ${Math.round(height * (title.length > 11 ? 0.16 : 0.2))}px system-ui, sans-serif`;", "ctx.font = canvasFont(900, Math.round(height * (title.length > 11 ? 0.16 : 0.2)));"),
              ("ctx.font = `700 ${Math.round(height * 0.105)}px system-ui, sans-serif`;", "ctx.font = canvasFont(700, Math.round(height * 0.105));"),
              ("ctx.font = '900 50px system-ui, sans-serif';", "ctx.font = canvasFont(900, 50);"),
              ("ctx.font = '800 24px system-ui, sans-serif';", "ctx.font = canvasFont(800, 24);"),
              ("ctx.font = `900 ${isPrimary ? 38 : 22}px system-ui, sans-serif`;", "ctx.font = canvasFont(900, isPrimary ? 38 : 22);"),
              ("ctx.font = `900 ${titleSize}px system-ui, sans-serif`;", "ctx.font = canvasFont(900, titleSize);"),
              ("ctx.font = `750 ${bodySize}px system-ui, sans-serif`;", "ctx.font = canvasFont(750, bodySize);"),
          ]
          first_person = Path('src/components/FirstPersonWorld.jsx')
          text = first_person.read_text()
          for old, new in replacements:
              if old in text:
                  text = text.replace(old, new)
              elif new not in text:
                  raise SystemExit(f'Missing canvas font replacement: {old}')
          first_person.write_text(text)

          ensure_insert_after(
              'src/utils/installInteractionTargeting.js',
              "const NEIGHBORHOOD_PATCH_FLAG = '__estudiemosVisibleNeighborhoodFix1349CleanSigns';\n",
              "const CANVAS_FONT_STACK = '\"Plus Jakarta Sans\", \"Segoe UI\", system-ui, sans-serif';\n\nfunction canvasFont(weight, size) {\n  return `${weight} ${size}px ${CANVAS_FONT_STACK}`;\n}\n",
              'const CANVAS_FONT_STACK =',
          )
          ensure_replace(
              'src/utils/installInteractionTargeting.js',
              'ctx.font = `900 ${title.length > 6 ? 132 : 178}px system-ui, sans-serif`;',
              'ctx.font = canvasFont(900, title.length > 6 ? 132 : 178);',
          )
          ensure_replace(
              'src/utils/installInteractionTargeting.js',
              "ctx.font = '800 72px system-ui, sans-serif';",
              'ctx.font = canvasFont(800, 72);',
          )

          ensure_insert_after(
              'src/utils/installRoomSpeakerWorld.js',
              "const SPEAKER_OCCLUDER_STYLE_ID = 'estudiemos-room-speaker-occluder-style';\n",
              "const ROOM_FONT_STACK = '\"Plus Jakarta Sans\", \"Segoe UI\", system-ui, sans-serif';\n\nfunction roomFont(weight, size) {\n  return `${weight} ${size}px ${ROOM_FONT_STACK}`;\n}\n",
              'const ROOM_FONT_STACK =',
          )
          speaker_replacements = [
              ('font: 900 22px/1 Arial, sans-serif;', 'font: 900 22px/1 "Plus Jakarta Sans", "Segoe UI", system-ui, sans-serif;'),
              ('font: 900 25px/1 Arial, sans-serif;', 'font: 900 25px/1 "Plus Jakarta Sans", "Segoe UI", system-ui, sans-serif;'),
              ("context.font = '900 44px Arial, sans-serif';", 'context.font = roomFont(900, 44);'),
              ("context.font = '900 48px Arial, sans-serif';", 'context.font = roomFont(900, 48);'),
              ("context.font = '800 28px Arial, sans-serif';", 'context.font = roomFont(800, 28);'),
          ]
          speaker = Path('src/utils/installRoomSpeakerWorld.js')
          text = speaker.read_text()
          for old, new in speaker_replacements:
              if old in text:
                  text = text.replace(old, new)
              elif new not in text:
                  raise SystemExit(f'Missing speaker font replacement: {old}')
          speaker.write_text(text)
          PY

          rm -f "$WORKFLOW_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/FirstPersonWorld.jsx src/components/StartScreen.jsx src/main.jsx src/styles/typography-system.css src/utils/installInteractionTargeting.js src/utils/installRoomSpeakerWorld.js
          git add -u "$WORKFLOW_FILE" || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Apply Estudiemos Room typography system"
          git push
