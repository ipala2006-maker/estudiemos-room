name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Diagnose Codex agenda and settings package
        run: |
          set +e
          echo "diagnostic run" > codex-deploy-debug.txt
          echo "date=$(date -u)" >> codex-deploy-debug.txt
          echo "pwd=$(pwd)" >> codex-deploy-debug.txt
          curl -L -w "http_code=%{http_code} size_download=%{size_download}\n" "https://tmpfiles.org/dl/wwwtv1bruLQ7/codex-agenda-settings-package.zip" -o codex-agenda-settings-update.zip >> codex-deploy-debug.txt 2>&1
          echo "curl_exit=$?" >> codex-deploy-debug.txt
          ls -l codex-agenda-settings-update.zip >> codex-deploy-debug.txt 2>&1
          file codex-agenda-settings-update.zip >> codex-deploy-debug.txt 2>&1
          python - <<'PY' >> codex-deploy-debug.txt 2>&1
          import zipfile
          path = 'codex-agenda-settings-update.zip'
          print('is_zip=', zipfile.is_zipfile(path))
          if zipfile.is_zipfile(path):
              with zipfile.ZipFile(path) as archive:
                  print('names=', archive.namelist()[:12])
          PY
          echo "python_exit=$?" >> codex-deploy-debug.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codex-deploy-debug.txt
          git commit -m "Add Codex deploy diagnostic"
          git push origin HEAD:main
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
