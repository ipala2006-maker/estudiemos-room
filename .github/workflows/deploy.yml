name: Apply Codex visual polish payload

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: codex-payload-apply
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Download payload
        run: |
          curl -L --fail --retry 3 --output payload.tgz "https://tmpfiles.org/dl/1784052547.d9cc7e773d33245f/wAwq1GYuONKZ/side-volume-panorama.tgz"
          tar -tzf payload.tgz

      - name: Apply and push files
        run: |
          tar -xzf payload.tgz
          git status --short
          git add src/components/FirstPersonWorld.jsx src/data/buildInfo.js src/assets/player-avatar-side.png src/assets/player-vehicle-side.png
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git commit -m "polish: add avatar vehicle sides and panorama"
          git push origin HEAD:main
