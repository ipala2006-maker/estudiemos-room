name: Apply Estudiemos Room Wall Agenda Keyboard Patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply patch
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/estudiemos-patch"
          curl -L --fail --retry 3 -o "$RUNNER_TEMP/estudiemos-patch/patch.tar.gz" "https://litter.catbox.moe/ool4sv.gz"
          tar -xzf "$RUNNER_TEMP/estudiemos-patch/patch.tar.gz" -C "$RUNNER_TEMP/estudiemos-patch"
          cp "$RUNNER_TEMP/estudiemos-patch/src/components/WallAgendaEditor.jsx" "src/components/WallAgendaEditor.jsx"
          cp "$RUNNER_TEMP/estudiemos-patch/src/components/FirstPersonWorld.jsx" "src/components/FirstPersonWorld.jsx"
          cp "$RUNNER_TEMP/estudiemos-patch/src/components/ComputerUI.jsx" "src/components/ComputerUI.jsx"
          cp "$RUNNER_TEMP/estudiemos-patch/src/main.jsx" "src/main.jsx"
          cp "$RUNNER_TEMP/estudiemos-patch/src/styles/app.css" "src/styles/app.css"
          cp "$RUNNER_TEMP/estudiemos-patch/src/data/buildInfo.js" "src/data/buildInfo.js"
          cp "$RUNNER_TEMP/estudiemos-patch/.github/workflows/deploy.yml" ".github/workflows/deploy.yml"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/WallAgendaEditor.jsx src/components/FirstPersonWorld.jsx src/components/ComputerUI.jsx src/main.jsx src/styles/app.css src/data/buildInfo.js .github/workflows/deploy.yml
          git commit -m "feat: add wall agenda editor and keyboard shortcuts" || exit 0
          git push
