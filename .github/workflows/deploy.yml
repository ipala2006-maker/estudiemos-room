name: Apply Estudiemos Room Agenda Remote Patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-estudiemos-room-agenda-remote-patch
  cancel-in-progress: false

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download patch
        run: |
          curl -L "https://litter.catbox.moe/rjqm4c.gz" -o /tmp/estudiemos-room-agenda-remote-patch.tar.gz
          mkdir -p /tmp/estudiemos-room-agenda-remote-patch
          tar -xzf /tmp/estudiemos-room-agenda-remote-patch.tar.gz -C /tmp/estudiemos-room-agenda-remote-patch

      - name: Apply files
        run: |
          cp -R /tmp/estudiemos-room-agenda-remote-patch/. .
          git status --short

      - name: Commit patch and restore deploy workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/studyAgenda.js src/utils/youtube.js src/main.jsx src/components/FirstPersonWorld.jsx src/components/ScreenRemoteControl.jsx src/components/ComputerUI.jsx src/styles/app.css src/styles/computer-os.css src/data/buildInfo.js .github/workflows/deploy.yml
          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            git commit -m "Fix agenda restore and improve screen remote controls"
            git push
          fi
