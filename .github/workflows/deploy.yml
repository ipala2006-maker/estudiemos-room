name: Apply product polish patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply app patch archive
        run: |
          set -euo pipefail
          curl -L 'https://litter.catbox.moe/nm6i3j.tar' -o /tmp/estudiemos-room-product-polish.tar
          tar -xf /tmp/estudiemos-room-product-polish.tar \
            src/components/StartScreen.jsx \
            src/components/Hud.jsx \
            src/components/VirtualComputerShell.jsx \
            src/components/FirstPersonWorld.jsx \
            src/main.jsx \
            src/styles/app.css \
            src/styles/camera-controls.css \
            src/styles/computer-os-corrections.css \
            src/data/buildInfo.js
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/StartScreen.jsx src/components/Hud.jsx src/components/VirtualComputerShell.jsx src/components/FirstPersonWorld.jsx src/main.jsx src/styles/app.css src/styles/camera-controls.css src/styles/computer-os-corrections.css src/data/buildInfo.js
          if git diff --cached --quiet; then
            echo 'No app changes to commit.'
            exit 0
          fi
          git commit -m 'polish: refine room experience'
          git push
