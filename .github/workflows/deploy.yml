name: Apply Estudiemos Room Skin Variants Patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-estudiemos-room-skin-variants-patch
  cancel-in-progress: false

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download patch
        run: |
          curl -L "https://litter.catbox.moe/f8shc1.gz" -o /tmp/estudiemos-room-skin-variants-patch.tar.gz
          mkdir -p /tmp/estudiemos-room-skin-variants-patch
          tar -xzf /tmp/estudiemos-room-skin-variants-patch.tar.gz -C /tmp/estudiemos-room-skin-variants-patch

      - name: Apply files
        run: |
          cp -R /tmp/estudiemos-room-skin-variants-patch/. .
          git status --short

      - name: Commit patch and restore deploy workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets/dachshund-mascot-cyber.jpg src/assets/dachshund-mascot-engineer.jpg src/components/DachshundMascot.jsx src/styles/app.css src/data/buildInfo.js .github/workflows/deploy.yml
          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            git commit -m "Add dachshund skin variant renders"
            git push
          fi
