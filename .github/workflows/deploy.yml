name: Apply skateboard dachshund patch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download patch
        run: |
          curl -L --fail "https://litter.catbox.moe/ts446c.zip" -o patch.zip
          unzip -oq patch.zip -d patch

      - name: Apply patch files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          cp patch/src/components/FirstPersonWorld.jsx src/components/FirstPersonWorld.jsx
          cp patch/src/components/DachshundMascot.jsx src/components/DachshundMascot.jsx
          cp patch/src/styles/app.css src/styles/app.css
          cp patch/src/data/buildInfo.js src/data/buildInfo.js
          git add src/components/FirstPersonWorld.jsx src/components/DachshundMascot.jsx src/styles/app.css src/data/buildInfo.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add skateboard dachshund companion"
            git push
          fi
