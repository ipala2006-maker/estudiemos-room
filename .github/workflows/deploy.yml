name: Apply back remote hand polish patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply app patch archive
        run: |
          set -euo pipefail
          curl -L 'https://tmpfiles.org/dl/1783972283.ea476c7568e5292b/waw914VIHeKG/estudiemos-room-back-remote-hand-polish.tgz' -o /tmp/back-remote-hand-polish.tgz
          tar -xzf /tmp/back-remote-hand-polish.tgz \
            src/components/FirstPersonWorld.jsx \
            src/components/VirtualComputerShell.jsx \
            src/components/ComputerUI.jsx \
            src/components/ScreenRemoteControl.jsx \
            src/styles/app.css \
            src/data/buildInfo.js
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/components/FirstPersonWorld.jsx \
            src/components/VirtualComputerShell.jsx \
            src/components/ComputerUI.jsx \
            src/components/ScreenRemoteControl.jsx \
            src/styles/app.css \
            src/data/buildInfo.js
          if git diff --cached --quiet; then
            echo 'No app changes to commit.'
            exit 0
          fi
          git commit -m 'fix: polish back navigation remote and hand'
          git push
