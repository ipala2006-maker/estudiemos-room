name: Apply product polish patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply patch archive
        run: |
          set -euo pipefail
          curl -L 'https://litter.catbox.moe/nm6i3j.tar' -o /tmp/estudiemos-room-product-polish.tar
          tar -xf /tmp/estudiemos-room-product-polish.tar
          cat > .github/workflows/deploy.yml <<'YAML'
          name: Deploy to GitHub Pages

          on:
            push:
              branches:
                - main

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: pages
            cancel-in-progress: true

          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 24
                    cache: npm

                - name: Install dependencies
                  run: npm ci

                - name: Build
                  run: npm run build

                - name: Setup Pages
                  uses: actions/configure-pages@v5
                  with:
                    enablement: true

                - name: Upload artifact
                  uses: actions/upload-pages-artifact@v3
                  with:
                    path: dist

            deploy:
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}
              runs-on: ubuntu-latest
              needs: build
              steps:
                - name: Deploy to GitHub Pages
                  id: deployment
                  uses: actions/deploy-pages@v4
          YAML
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/StartScreen.jsx src/components/Hud.jsx src/components/VirtualComputerShell.jsx src/components/FirstPersonWorld.jsx src/main.jsx src/styles/app.css src/styles/camera-controls.css src/styles/computer-os-corrections.css src/data/buildInfo.js .github/workflows/deploy.yml
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'polish: refine room experience'
          git push
