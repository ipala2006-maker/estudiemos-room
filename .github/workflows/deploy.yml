name: Apply Codex first person payload

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: codex-payload-apply
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Download payload
        run: |
          curl -L --fail --retry 3 --output payload.tgz "https://tmpfiles.org/dl/1784053518.09bd9049b6cdbc57/wIwR1sYcxq2I/first-person-sky-hand.tgz"
          tar -tzf payload.tgz

      - name: Apply and push files
        run: |
          tar -xzf payload.tgz
          git status --short
          git add src/components/FirstPersonWorld.jsx src/components/Hud.jsx src/data/buildInfo.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git commit -m "fix: keep first person and restore sky"
          git push origin HEAD:main
