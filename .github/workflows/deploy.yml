name: Apply Player Vehicle And AI Environment Payload

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-payload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download payload
        run: |
          curl -L --fail --retry 3 --output payload-player-vehicle-ai-environment.tgz "https://tmpfiles.org/dl/1783997876.3e4cdd7b942c348a/wnwy1uJFU0NR/payload-player-vehicle-ai-environment.tgz"
          tar -xzf payload-player-vehicle-ai-environment.tgz

      - name: Commit player vehicle and AI environment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/FirstPersonWorld.jsx src/data/buildInfo.js src/assets/player-vehicle-back.png src/assets/player-vehicle-front.png src/assets/environment-meadow-backdrop.jpg
          if git diff --cached --quiet; then
            echo "No payload changes to commit."
            exit 0
          fi
          git commit -m "polish: add player vehicle and ai meadow backdrop"
          git push
