name: Apply Estudiemos Room Backspace 32x9 Patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download patch
        run: |
          curl -L "https://litter.catbox.moe/bbu7za.tgz" -o /tmp/estudiemos-room-backspace-32x9.tgz
          tar -xzf /tmp/estudiemos-room-backspace-32x9.tgz

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ComputerUI.jsx src/components/VirtualComputerShell.jsx src/components/FirstPersonWorld.jsx src/styles/app.css src/data/buildInfo.js .github/workflows/deploy.yml
          git status --short
          git commit -m "fix: make computer backspace and screen ratio reliable" || exit 0
          git push
