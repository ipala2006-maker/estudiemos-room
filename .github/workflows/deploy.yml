name: Apply Estudiemos Room Spotify Agenda Polish Patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-estudiemos-room-spotify-agenda-polish-patch
  cancel-in-progress: false

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download patch
        run: |
          curl -L "https://litter.catbox.moe/kar6j1.gz" -o /tmp/patch.tar.gz
          mkdir -p /tmp/patch
          tar -xzf /tmp/patch.tar.gz -C /tmp/patch

      - name: Apply files
        run: |
          cp -R /tmp/patch/. .
          git status --short

      - name: Commit patch and restore deploy workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ComputerUI.jsx src/styles/computer-os-corrections.css src/data/buildInfo.js .github/workflows/deploy.yml
          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            git commit -m "fix: polish spotify and agenda controls"
            git push
          fi
