name: Apply Estudiemos Room Backspace Launcher Patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download patch
        run: |
          curl -L "https://litter.catbox.moe/uv3i2v.tgz" -o /tmp/estudiemos-room-backspace-launcher-screen.tgz
          tar -xzf /tmp/estudiemos-room-backspace-launcher-screen.tgz

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ComputerUI.jsx src/components/VirtualComputerShell.jsx src/components/FirstPersonWorld.jsx src/data/buildInfo.js .github/workflows/deploy.yml
          git status --short
          git commit -m "fix: return computer backspace to launcher" || exit 0
          git push
