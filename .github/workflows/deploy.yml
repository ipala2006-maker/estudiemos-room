name: Apply Codex Payload

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: codex-payload-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download payload
        run: curl -L 'https://tmpfiles.org/dl/1783976643.3b5fd35a61872d9c/wjwI1yLFLlQn/payload-character-hand-polish.tgz' -o /tmp/codex-payload.tgz

      - name: Extract app files
        run: tar -xzf /tmp/codex-payload.tgz

      - name: Commit app files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/FirstPersonWorld.jsx src/data/buildInfo.js
          if git diff --cached --quiet; then
            echo "No app changes to commit"
            exit 0
          fi
          git commit -m "polish: improve player character and hand"
          git push
