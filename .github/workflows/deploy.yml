name: Apply Illustrated Player Skin Payload

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-payload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download payload
        run: |
          curl -L --fail --retry 3 --output payload-illustrated-player-skin.tgz "https://tmpfiles.org/dl/wUwF1qHd83Wo/payload-illustrated-player-skin.tgz"
          tar -xzf payload-illustrated-player-skin.tgz

      - name: Commit illustrated player skin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/FirstPersonWorld.jsx src/data/buildInfo.js src/assets/player-avatar-front.png src/assets/player-avatar-back.png src/assets/player-hand-viewmodel.png
          if git diff --cached --quiet; then
            echo "No payload changes to commit."
            exit 0
          fi
          git commit -m "polish: replace player skin with illustrated assets"
          git push
