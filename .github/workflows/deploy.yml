name: Codex Apply Focus Profile And Agenda Fixes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Codex patch package
        run: curl -fL "https://tmpfiles.org/dl/wIwKvkGL6C5a/codex-profile-calendar-fixes-package.zip" -o codex-profile-calendar-fixes.zip

      - name: Extract patched files
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil
          import zipfile

          allowed = {
              'src/main.jsx',
              'src/components/ComputerUI.jsx',
              'src/components/DachshundMascot.jsx',
              'src/components/FirstPersonWorld.jsx',
              'src/components/VirtualComputerShell.jsx',
              'src/styles/app.css',
              'src/styles/computer-os-corrections.css',
          }

          with zipfile.ZipFile('codex-profile-calendar-fixes.zip') as archive:
              for member in archive.infolist():
                  name = member.filename.replace('\\', '/').lstrip('/')
                  if name not in allowed:
                      continue
                  target = Path(name)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(member) as source, target.open('wb') as dest:
                      shutil.copyfileobj(source, dest)
          PY

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          git add src/main.jsx src/components/ComputerUI.jsx src/components/DachshundMascot.jsx src/components/FirstPersonWorld.jsx src/components/VirtualComputerShell.jsx src/styles/app.css src/styles/computer-os-corrections.css
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Improve focus profile and agenda empty state"
            git push origin HEAD:main
          fi
