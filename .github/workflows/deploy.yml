name: Apply camera hand computer cleanup patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply app patch archive
        run: |
          set -euo pipefail
          curl -L 'https://tmpfiles.org/dl/1783967644.1dd24acab96dd908/wHwb1IUcKSuF/estudiemos-room-camera-hand-computer-cleanup.tgz' -o /tmp/camera-hand-computer-cleanup.tgz
          tar -xzf /tmp/camera-hand-computer-cleanup.tgz \
            src/components/FirstPersonWorld.jsx \
            src/components/VirtualComputerShell.jsx \
            src/components/ComputerUI.jsx \
            src/components/StartScreen.jsx \
            src/main.jsx \
            src/data/buildInfo.js \
            src/styles/computer-os-corrections.css
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/components/FirstPersonWorld.jsx \
            src/components/VirtualComputerShell.jsx \
            src/components/ComputerUI.jsx \
            src/components/StartScreen.jsx \
            src/main.jsx \
            src/data/buildInfo.js \
            src/styles/computer-os-corrections.css
          if git diff --cached --quiet; then
            echo 'No app changes to commit.'
            exit 0
          fi
          git commit -m 'fix: polish camera hand and computer controls'
          git push
