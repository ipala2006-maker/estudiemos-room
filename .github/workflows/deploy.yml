name: Apply Estudiemos Room Interior Performance Patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download patch
        run: |
          curl -L "https://litter.catbox.moe/cwzwha.tgz" -o /tmp/estudiemos-room-interior-clean-performance.tgz
          tar -xzf /tmp/estudiemos-room-interior-clean-performance.tgz

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/FirstPersonWorld.jsx src/data/buildInfo.js .github/workflows/deploy.yml
          git status --short
          git commit -m "fix: hide exterior inside casa 1 and improve performance" || exit 0
          git push
