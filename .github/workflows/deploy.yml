name: Codex Apply Dachshund Professional Pass

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: codex-apply-dachshund-pro
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download Codex patch
        run: curl -fL "https://files.catbox.moe/32gsda.zip" -o codex-dachshund-pro.zip

      - name: Apply scoped patch
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          allowed = {
            "src/components/FirstPersonWorld.jsx",
            "src/styles/app.css",
            "src/data/buildInfo.js",
          }
          found = set()
          root = pathlib.Path.cwd()

          with zipfile.ZipFile("codex-dachshund-pro.zip") as archive:
            for info in archive.infolist():
              normalized = info.filename.replace("\\", "/").lstrip("/")
              if not normalized or normalized.endswith("/"):
                continue
              if normalized not in allowed:
                raise SystemExit(f"Unexpected file in patch: {normalized}")
              target = root / normalized
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(archive.read(info))
              found.add(normalized)

          missing = allowed - found
          if missing:
            raise SystemExit(f"Missing expected files: {sorted(missing)}")
          PY

      - name: Commit scoped patch
        run: |
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          git rm -f .github/codex-apply-trigger.txt 2>/dev/null || rm -f .github/codex-apply-trigger.txt
          git add src/components/FirstPersonWorld.jsx src/styles/app.css src/data/buildInfo.js
          if git diff --cached --quiet; then
            echo "No scoped changes to commit."
            exit 0
          fi
          git commit -m "Polish dachshund companion quality"
          git push origin HEAD:main
