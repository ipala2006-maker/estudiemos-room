name: Apply agenda layout softening

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-agenda-layout-soft.yml'
      - '.codex/agenda-layout-soft.patch.gz.b64'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply agenda patch
        run: |
          base64 -d .codex/agenda-layout-soft.patch.gz.b64 > /tmp/agenda-layout-soft.patch.gz
          gzip -dc /tmp/agenda-layout-soft.patch.gz > /tmp/agenda-layout-soft.patch
          git apply --check --ignore-whitespace --whitespace=nowarn /tmp/agenda-layout-soft.patch
          git apply --ignore-whitespace --whitespace=nowarn /tmp/agenda-layout-soft.patch
      - name: Commit final agenda layout
        run: |
          rm -rf .codex
          rm -f .github/workflows/apply-agenda-layout-soft.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Polish agenda planner layout"
            git push
          fi
