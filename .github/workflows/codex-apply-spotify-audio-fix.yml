name: Codex Apply Spotify Audio Fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply Spotify audio fix
        run: |
          set -euo pipefail
          cat > /tmp/codex-spotify-audio-fix.patch <<'PATCH'
