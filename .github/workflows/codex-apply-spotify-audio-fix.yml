name: Codex Apply Spotify Audio Fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply patch and build
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          from pathlib import Path
          data = ''
          Path('codex.patch').write_bytes(gzip.decompress(base64.b64decode(data)))
          PY
          git apply codex.patch
          npm ci
          npm run build
          git config user.name codex-agent
          git config user.email codex-agent@users.noreply.github.com
          git add src/utils/spotify.js src/main.jsx src/components/ComputerUI.jsx src/components/ScreenRemoteControl.jsx src/components/FirstPersonWorld.jsx src/styles/app.css src/styles/computer-os-corrections.css src/data/buildInfo.js
          git rm --ignore-unmatch .github/workflows/codex-apply-spotify-audio-fix.yml
          git status --short
          git commit -m 'fix: improve spotify audio controls' || exit 0
          git push