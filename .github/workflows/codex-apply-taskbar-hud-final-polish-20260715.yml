name: Codex Apply Final Taskbar HUD Polish

on:
  push:
    paths:
      - '.github/workflows/codex-apply-taskbar-hud-final-polish-20260715.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply Codex patch
        shell: bash
        run: |
          cat > /tmp/codex.patch.b64 <<'PATCH_B64'
          
          PATCH_B64
          base64 -d /tmp/codex.patch.b64 | gzip -d > /tmp/codex.patch
          git apply /tmp/codex.patch
          rm .github/workflows/codex-apply-taskbar-hud-final-polish-20260715.yml

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "codex-agent"
          git config user.email "codex-agent@users.noreply.github.com"
          git add src/styles/app.css src/styles/computer-os-corrections.css src/data/buildInfo.js .github/workflows/codex-apply-taskbar-hud-final-polish-20260715.yml
          git commit -m "fix: polish virtual desktop and entry HUD"
          git push origin main
