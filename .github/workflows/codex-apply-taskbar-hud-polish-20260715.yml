name: Codex Apply Taskbar HUD Polish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Decode patch
        run: |
          python3 - <<'PY'
          import base64, gzip
          data = ''''''
          open('codex.patch', 'wb').write(gzip.decompress(base64.b64decode(data)))
          PY

      - name: Apply patch
        run: git apply codex.patch

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit changes
        run: |
          git config user.name "codex-agent"
          git config user.email "codex-agent@users.noreply.github.com"
          git add src/styles/computer-os-corrections.css src/styles/app.css src/data/buildInfo.js
          git rm --ignore-unmatch .github/workflows/codex-apply-taskbar-hud-polish-20260715.yml
          git status --short
          git commit -m "fix: polish taskbar and entry panels" || exit 0
          git push
