name: Apply Estudiemos Room art direction payload

on:
  push:
    branches:
      - main
    paths:
      - '.codex-art-payload/**'
      - '.github/workflows/apply-art-direction.yml'

permissions:
  contents: write

jobs:
  apply-art-direction:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply verified art direction patch
        run: node .codex-art-payload/apply-art-direction.mjs

      - name: Commit applied source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit"
            exit 0
          fi
          git commit -m "Apply Estudiemos Room art direction pass"
          git push
