name: Apply AI start background

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-apply-ai-start-background.yml
      - codex-ai-start-background/**

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply generated background
        run: |
          set -euo pipefail

          WORKFLOW_FILE=".github/workflows/codex-apply-ai-start-background.yml"
          CHUNK_DIR="codex-ai-start-background"
          ASSET_FILE="src/assets/start-room-ai-background.webp"

          if [ ! -d "$CHUNK_DIR" ]; then
            echo "No chunk directory found; nothing to apply."
            exit 0
          fi

          mkdir -p src/assets src/styles
          cat "$CHUNK_DIR"/chunk-*.txt > /tmp/start-room-ai-background.webp.b64
          base64 -d /tmp/start-room-ai-background.webp.b64 > "$ASSET_FILE"

          cat > src/components/StartScreen.jsx <<'EOF'
          import { ArrowRight, Play } from 'lucide-react';
          import { BUILD_LABEL, BUILD_MARKER } from '../data/buildInfo.js';
          import '../styles/start-screen-ai.css';

          export function StartScreen({ onEnter }) {
            return (
              <main className="start-screen start-screen-immersive">
                <span className="build-version-pill" data-build-marker={BUILD_MARKER}>{BUILD_LABEL}</span>
                <section className="start-content start-content-immersive" aria-labelledby="start-title">
                  <h1 id="start-title">ESTUDIEMOS ROOM</h1>
                  <p className="start-lead">Tu sala digital para estudiar con calma.</p>
                  <button type="button" className="primary-action start-enter-button" onClick={onEnter} aria-label="Empezar a estudiar en Casa 1">
                    <Play size={18} aria-hidden="true" fill="currentColor" />
                    <span>EMPEZAR A ESTUDIAR</span>
                    <ArrowRight size={20} aria-hidden="true" />
                  </button>
                </section>
              </main>
            );
          }
          EOF

          cat > src/styles/start-screen-ai.css <<'EOF'
          /* AI-generated background pass for the immersive entry screen. */
          .start-screen.start-screen-immersive {
            background:
              linear-gradient(180deg, rgba(5, 8, 8, 0.02), rgba(5, 8, 8, 0.2) 66%, rgba(5, 8, 8, 0.62)),
              linear-gradient(90deg, rgba(4, 7, 8, 0.18), rgba(4, 7, 8, 0.04) 46%, rgba(4, 7, 8, 0.18)),
              url("../assets/start-room-ai-background.webp") center / cover no-repeat,
              #101817 !important;
          }

          .start-screen.start-screen-immersive::before {
            height: 100% !important;
            background:
              radial-gradient(circle at 50% 36%, rgba(255, 248, 218, 0.12), transparent 48%),
              linear-gradient(180deg, rgba(255, 248, 231, 0.04), transparent 42%, rgba(0, 0, 0, 0.18)) !important;
            opacity: 1 !important;
          }

          .start-screen.start-screen-immersive::after {
            background:
              radial-gradient(circle at 50% 44%, transparent 0 46%, rgba(0, 0, 0, 0.14) 82%),
              linear-gradient(90deg, rgba(0, 0, 0, 0.18), transparent 38%, rgba(0, 0, 0, 0.1)) !important;
            transform: none !important;
            transform-origin: center !important;
          }

          @media (max-width: 760px) {
            .start-screen.start-screen-immersive {
              background-position: 58% center !important;
            }
          }
          EOF

          rm -rf "$CHUNK_DIR" "$WORKFLOW_FILE" /tmp/start-room-ai-background.webp.b64

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/components/StartScreen.jsx src/styles/start-screen-ai.css "$ASSET_FILE"
          git add -u "$CHUNK_DIR" || true
          git add -u "$WORKFLOW_FILE" || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Use AI-generated start screen background"
          git push
